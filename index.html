<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Merle Reimann</title>
  <link rel="icon" type="image/png" href="uploads/blackbird.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Merle M. Reimann – Postdoctoral Researcher at KTH Royal Institute of Technology, Division of Robotics, Perception and Learning. Spoken Human–Robot Interaction, Dialogue Management, Capability Communication." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      overflow: hidden;
      background: #efece4;
      font-family: '"EB Garamond", "Cormorant Garamond", Georgia, serif';
      color: #1d1a16;
    }
    #root {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button { font-family: inherit; }
    a { color: inherit; }
    @media (max-width: 720px) {
      html, body { overflow: auto; height: auto; }
      #root { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Load files in order: data first, then shared figures, then layouts, then app -->
  <script type="text/babel" src="data.js"></script>
  <script type="text/babel" src="figures.js"></script>
  <script type="text/babel" src="site-desktop.js"></script>
  <script type="text/babel" src="site-mobile.js"></script>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
